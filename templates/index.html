<!doctype html>
<html>
  <head>
    <title>Mock Interview Bot</title>

    <style>
      body {
        font-family: Arial;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .box {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      input,
      select {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
      }

      button {
        width: 95%;
        padding: 10px;
        background: #4facfe;
        border: none;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      button:hover {
        background: #007bff;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>🚀 Mock Interview Bot</h2>

      <form action="/start" method="POST">
        <input type="text" name="name" placeholder="Name" required />
        <input type="email" name="email" placeholder="Email" required />

        <select name="role">
          <option>AI Engineer</option>
          <option>Data Scientist</option>
          <option>Python Developer</option>
          <option>Web Developer</option>
        </select>

        <button>Start Interview</button>
      </form>
    </div>
  </body>
</html>
