<!doctype html>
<html>
  <head>
    <title>Interview</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: white;
        padding: 30px;
        width: 500px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        margin-top: 10px;
      }

      button {
        margin-top: 10px;
        width: 100%;
        padding: 10px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .q {
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h3>Question {{ q_number }}</h3>

      <p class="q">{{ question }}</p>

      <form action="/answer" method="POST">
        <textarea
          name="answer"
          placeholder="Type your answer..."
          required
        ></textarea>
        <button>Submit Answer</button>
      </form>
    </div>
  </body>
</html>
